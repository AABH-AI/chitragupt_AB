# Orchestration profile: Enterprise
#
# Applied to workspaces on the Enterprise plan or any workspace with
# strict data residency or compliance requirements.
# Overrides constraint_defaults in orchestration.yaml at runtime.

profile: enterprise

constraints:
  plan_tier: enterprise
  data_residency: us          # override per workspace if eu / apac / on_premise
  compliance_flags: []        # set per workspace: [GDPR] | [HIPAA] | [SOC2]
  environment: production
  allow_external_apis: true
  required_capabilities:
    - hitl_interrupts          # approval workflows mandatory on enterprise plan
    - explicit_graph           # traceability mandatory in production
    - self_hostable            # must be able to self-host if residency requires it

preferred_connector: langgraph

notes: >
  Enterprise clients with EU data residency must set data_residency: eu.
  Enterprise clients with HIPAA requirements must add HIPAA to compliance_flags.
  Both conditions trigger hard-filter rules that restrict selection to self-hostable
  connectors only. LangGraph satisfies both conditions.
