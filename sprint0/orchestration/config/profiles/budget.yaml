# Orchestration profile: Budget / Starter
#
# Applied to workspaces on the Starter or free plan.
# Optimises for minimum framework and infrastructure cost.
# Relaxes some capability requirements not needed at this tier.

profile: budget

constraints:
  plan_tier: starter
  data_residency: us          # Together AI is US-only; residency requirement must be us
  compliance_flags: []        # no compliance flags allowed on starter plan
  environment: production
  allow_external_apis: true
  required_capabilities:
    - streaming               # streaming is still required for UX (INV-UX-02)

preferred_connectors:
  - langgraph                 # first choice: full capabilities, zero framework cost
  - together_ai               # second choice: cost-competitive LLM access for US-only starter clients

notes: >
  LangGraph has zero licensing cost and should be the default even on starter plans.
  Together AI is listed as a secondary option for clients who require access to
  specific open-source models (Llama, Mistral) and are in the US region only.
  Do not use Together AI for any workspace with EU/APAC residency or compliance flags.
