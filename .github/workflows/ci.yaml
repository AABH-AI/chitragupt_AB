name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Rust — state-machine kernel
  # Runs inside Docker: fmt check → clippy → 188 unit/integration tests
  # ─────────────────────────────────────────────────────────────────────────────
  state-machine:
    name: State Machine (Rust)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build tester stage (fmt · clippy · tests)
        uses: docker/build-push-action@v6
        with:
          context: .
          target: tester
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────────────────────────
  # Python — AI / RAG orchestration  (enable when services/ai-orchestration exists)
